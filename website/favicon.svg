<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- Blue frame (back) -->
  <g transform="rotate(-10, 75, 82)">
    <rect x="15" y="42" width="120" height="80" rx="12" fill="#89b4fa"/>
    <rect x="15" y="42" width="120" height="20" rx="12" fill="#6ba0f0"/>
    <rect x="15" y="52" width="120" height="10" fill="#6ba0f0"/>
    <circle cx="30" cy="52" r="4" fill="#1e1e2e" opacity="0.35"/>
  </g>
  <!-- Mauve frame (middle) -->
  <g transform="rotate(-2, 80, 84)">
    <rect x="18" y="44" width="120" height="80" rx="12" fill="#cba6f7"/>
    <rect x="18" y="44" width="120" height="20" rx="12" fill="#b08de0"/>
    <rect x="18" y="54" width="120" height="10" fill="#b08de0"/>
    <circle cx="33" cy="54" r="4" fill="#1e1e2e" opacity="0.35"/>
  </g>
  <!-- Peach frame (front) -->
  <g transform="rotate(8, 85, 86)">
    <rect x="21" y="46" width="120" height="80" rx="12" fill="#fab387"/>
    <rect x="21" y="46" width="120" height="20" rx="12" fill="#e09060"/>
    <rect x="21" y="56" width="120" height="10" fill="#e09060"/>
    <circle cx="36" cy="56" r="4" fill="#1e1e2e" opacity="0.35"/>
    <!-- W lettermark -->
    <text x="81" y="108" font-family="system-ui, -apple-system, sans-serif" font-weight="900"
          font-size="42" text-anchor="middle" fill="#1e1e2e" opacity="0.75">W</text>
  </g>
</svg>
