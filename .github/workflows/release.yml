name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun build widgetizr.ts --outfile dist/widgetizr.js --external "gi://*"

      - name: Package widgets
        run: |
          tar -czf dist/widgets.tar.gz widgets/

      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/^const APP_VERSION = "\(.*\)";$/\1/p' widgetizr.ts)
          if [ -z "$VERSION" ]; then
            echo "Error: could not extract APP_VERSION from widgetizr.ts" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Write version file
        run: printf '%s\n' "${{ steps.version.outputs.version }}" > dist/version.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Widgetizr v${{ steps.version.outputs.version }}
          files: |
            dist/widgetizr.js
            dist/widgets.tar.gz
            dist/version.txt

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy website and version.txt
        run: |
          rsync -az --delete website/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/
          rsync -az dist/version.txt ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/version.txt
